<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>优码智库AI搜索站</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <span id="topDate"></span>
      <button id="loginBtn" class="login-btn">登录</button>
    </div>

    <header class="header" style="padding: 20px 48px 0;">
      <h1>优码智库AI搜索站</h1>
      <p>智能聚合行业资讯、招标信息与分析报告</p>
    </header>

    <!-- 搜索框 -->
    <div class="home-search-wrap">
      <div class="home-search-box">
        <span class="home-search-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="7.5" cy="7.5" r="5.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M12 12L16 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </span>
        <input type="text" id="homeSearchInput" placeholder="搜索城市更新、政策法规、招投标、物业管理...">
        <button id="homeSearchBtn">搜索</button>
      </div>
    </div>

    <!-- 四个快捷入口 -->
    <div class="nav-grid">
      <a href="city-update.html" class="nav-card glass-card">
        <span class="nav-icon">🏙️</span>
        <h3>城市更新日报</h3>
        <p>汇聚中央与地方城市更新政策、实践案例、数字化动态</p>
        <span class="nav-status active">已上线</span>
      </a>

      <a href="daily.html" class="nav-card glass-card">
        <span class="nav-icon">📋</span>
        <h3>行业日报</h3>
        <p>地产、物业、园区、保障房等不动产行业每日精选</p>
        <span class="nav-status active">已上线</span>
      </a>

      <a href="competitor.html" class="nav-card glass-card">
        <span class="nav-icon">🏢</span>
        <h3>竞品动态</h3>
        <p>头部房企、物企、城服企业重点动态追踪</p>
        <span class="nav-status active">已上线</span>
      </a>

      <a href="bidding.html" class="nav-card glass-card">
        <span class="nav-icon">📑</span>
        <h3>招标信息</h3>
        <p>智慧城市、智慧物业、城市更新相关招投标信息</p>
        <span class="nav-status dev">开发中</span>
      </a>
    </div>

    <!-- 今日重点资讯 -->
    <div class="section-panel glass-card" id="todaySection">
      <div class="section-header">
        <h2>📰 今日重点资讯</h2>
        <button class="section-toggle" id="todayToggle">查看更多</button>
      </div>
      <div class="section-list" id="todayList">
        <div class="section-loading">
          <div class="spinner"></div>
          <p>正在加载今日资讯...</p>
        </div>
      </div>
    </div>

    <!-- 关键词热度 -->
    <div class="section-panel glass-card" id="wordCloudSection">
      <div class="section-header">
        <h2>🔥 今日关键词热度</h2>
      </div>
      <div class="word-cloud" id="wordCloud"></div>
    </div>

    <footer style="text-align: center; padding: 40px; color: rgba(255,255,255,0.25); font-size: 13px;">
      <p>优码智库 · AI 驱动的不动产行业信息聚合平台</p>
    </footer>
  </div>

  <!-- 登录弹窗 -->
  <div id="loginModal" class="login-modal hidden">
    <div class="login-content glass-card">
      <div class="login-header">
        <h2>🔐 优码智库AI搜索站</h2>
        <p>请输入账号密码访问优码智库</p>
      </div>
      <input type="text" id="loginUser" placeholder="账号" />
      <input type="password" id="loginPass" placeholder="密码" />
      <button id="doLogin">登录</button>
      <p id="loginError" class="login-error hidden">账号或密码错误</p>
    </div>
  </div>

  <script>
    // 右上角日期
    function updateDate() {
      const now = new Date();
      const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      const w = weekdays[now.getDay()];
      document.getElementById("topDate").innerHTML = `<span style="background: rgba(255,255,255,0.1); padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); font-size: 14px; color: rgba(255,255,255,0.85);">${y}年${m}月${d}日 ${w}</span>`;
    }
    updateDate();

    // 登录逻辑
    const CORRECT_USER = "admin";
    const CORRECT_PASS = "youma2024";
    const LOGIN_KEY = "youma_logged_in";
    const loginBtn = document.getElementById("loginBtn");

    function updateLoginBtn() {
      if (localStorage.getItem(LOGIN_KEY)) {
        loginBtn.textContent = "退出";
        loginBtn.style.background = "rgba(239,68,68,0.15)";
        loginBtn.style.borderColor = "rgba(239,68,68,0.3)";
        loginBtn.style.color = "#fca5a5";
      } else {
        loginBtn.textContent = "登录";
        loginBtn.style.background = "rgba(255,255,255,0.06)";
        loginBtn.style.borderColor = "rgba(255,255,255,0.2)";
        loginBtn.style.color = "rgba(255,255,255,0.7)";
      }
    }

    function checkLogin() {
      if (!localStorage.getItem(LOGIN_KEY)) {
        document.getElementById("loginModal").classList.remove("hidden");
        document.body.style.overflow = "hidden";
      }
    }

    loginBtn.addEventListener("click", () => {
      if (localStorage.getItem(LOGIN_KEY)) {
        localStorage.removeItem(LOGIN_KEY);
        location.reload();
      }
    });

    document.getElementById("doLogin").addEventListener("click", () => {
      const u = document.getElementById("loginUser").value.trim();
      const p = document.getElementById("loginPass").value.trim();
      if (u === CORRECT_USER && p === CORRECT_PASS) {
        localStorage.setItem(LOGIN_KEY, "1");
        document.getElementById("loginModal").classList.add("hidden");
        document.body.style.overflow = "";
        updateLoginBtn();
      } else {
        document.getElementById("loginError").classList.remove("hidden");
      }
    });

    document.getElementById("loginPass").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("doLogin").click();
    });

    updateLoginBtn();
    checkLogin();

    /* ===== 今日重点资讯 ===== */
    let todayAll = [];
    let todayExpanded = false;
    const todayListEl = document.getElementById('todayList');
    const todayToggle = document.getElementById('todayToggle');

    async function loadTodayNews() {
      const todayStr = new Date().toISOString().slice(0, 10);
      const cacheKey = 'youma_today_' + todayStr;
      const cached = localStorage.getItem(cacheKey);

      if (cached) {
        try {
          todayAll = JSON.parse(cached);
          renderToday();
          return;
        } catch { /* ignore */ }
      }

      try {
        const res = await fetch('/api/city-daily');
        const data = await res.json();
        if (data.error || !data.results || data.results.length === 0) {
          todayListEl.innerHTML = '<p style="color:rgba(255,255,255,0.4);padding:20px 0;">暂无今日资讯</p>';
          todayToggle.style.display = 'none';
          return;
        }
        todayAll = data.results;
        localStorage.setItem(cacheKey, JSON.stringify(todayAll));
        renderToday();
      } catch (err) {
        todayListEl.innerHTML = '<p style="color:rgba(255,255,255,0.4);padding:20px 0;">加载失败，请稍后重试</p>';
        todayToggle.style.display = 'none';
      }
    }

    function renderToday() {
      const limit = todayExpanded ? 10 : 3;
      const items = todayAll.slice(0, limit);
      todayListEl.innerHTML = items.map(r => {
        const catClass = `cat-${r.category || '行业观点'}`;
        const dateStr = r.pubDate ? formatDate(r.pubDate) : '';
        return `
          <a href="${r.url}" target="_blank" rel="noopener" class="section-item">
            <div class="section-item-main">
              <span class="section-tag ${catClass}">${escapeHtml(r.category || '资讯')}</span>
              <h4 class="section-item-title">${escapeHtml(r.title)}</h4>
              <p class="section-item-abs">${escapeHtml(r.abstract || '')}</p>
            </div>
            <div class="section-item-meta">
              <span>${escapeHtml(r.source || '未知来源')}</span>
              ${dateStr ? `<span>${dateStr}</span>` : ''}
            </div>
          </a>
        `;
      }).join('');

      todayToggle.textContent = todayExpanded ? '收起' : '查看更多';
      todayToggle.style.display = todayAll.length > 3 ? 'inline-block' : 'none';
    }

    todayToggle.addEventListener('click', () => {
      todayExpanded = !todayExpanded;
      renderToday();
    });

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(iso) {
      try {
        const d = new Date(iso);
        if (isNaN(d.getTime())) return '';
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      } catch { return ''; }
    }

    /* ===== 今日关键词热度词云（10个词，按热度从大到小） ===== */
    const keywords = [
      { text: '城市更新', weight: 10 },
      { text: '城中村', weight: 9 },
      { text: '数字化转型', weight: 9 },
      { text: '政策法规', weight: 8 },
      { text: '智慧物业', weight: 8 },
      { text: '招投标', weight: 7 },
      { text: '老旧小区', weight: 7 },
      { text: '片区更新', weight: 6 },
      { text: 'REITs', weight: 6 },
      { text: '存量改造', weight: 6 }
    ];

    function renderWordCloud() {
      const container = document.getElementById('wordCloud');
      const colors = [
        'rgba(102,126,234,0.95)',
        'rgba(168,85,247,0.95)',
        'rgba(52,211,153,0.95)',
        'rgba(251,191,36,0.95)',
        'rgba(236,72,153,0.95)',
        'rgba(96,165,250,0.95)',
        'rgba(192,132,252,0.95)',
        'rgba(248,113,113,0.95)',
        'rgba(45,212,191,0.95)',
        'rgba(250,204,21,0.95)'
      ];

      const sorted = [...keywords].sort((a, b) => b.weight - a.weight);

      container.innerHTML = sorted.map((k, i) => {
        const size = 14 + k.weight * 2.4;
        const color = colors[i % colors.length];
        const opacity = 0.55 + (k.weight / 10) * 0.45;
        const rotate = (Math.random() - 0.5) * 8;
        return `<span class="word-cloud-item" style="font-size:${size}px;color:${color};opacity:${opacity};transform:rotate(${rotate}deg)">${escapeHtml(k.text)}</span>`;
      }).join('');
    }

    loadTodayNews();
    renderWordCloud();

    /* ===== 首页搜索 ===== */
    const homeSearchInput = document.getElementById('homeSearchInput');
    const homeSearchBtn = document.getElementById('homeSearchBtn');

    homeSearchBtn.addEventListener('click', () => {
      const q = homeSearchInput.value.trim();
      if (q) window.location.href = `daily.html?q=${encodeURIComponent(q)}`;
    });

    homeSearchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') homeSearchBtn.click();
    });
  </script>
</body>
</html>
