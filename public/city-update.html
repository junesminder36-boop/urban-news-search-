<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>城市更新日报 - 优码智库AI搜索站</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page-header { margin-bottom: 28px; padding: 24px; }

    .search-section { margin-bottom: 28px; }
    .search-box.full-width {
      max-width: 100%;
      margin-bottom: 14px;
    }
    .search-actions-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .search-actions-row button {
      padding: 12px 28px;
      border-radius: 40px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    #searchBtn {
      background: linear-gradient(135deg, #667eea, #a855f7);
      color: #fff;
    }
    #searchBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
    }
    #dailyBtn {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: #fff;
    }
    #dailyBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(245, 158, 11, 0.4);
    }
    #refreshBtn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7);
    }
    #refreshBtn:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }

    .ai-assistant-simple {
      text-align: center;
      padding: 32px 0;
      border-top: 1px solid rgba(255,255,255,0.06);
      margin-top: 8px;
    }
    .btn-generate-daily {
      padding: 14px 40px;
      border-radius: 40px;
      border: none;
      background: linear-gradient(135deg, #667eea, #a855f7);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 20px rgba(102,126,234,0.3);
      transition: all 0.3s ease;
    }
    .btn-generate-daily:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(102,126,234,0.45);
    }

    .markdown-report {
      margin-top: 28px;
      animation: fadeIn 0.5s ease;
    }
    .markdown-report-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .markdown-report-header h3 {
      color: #fff;
      font-size: 18px;
      font-weight: 600;
    }
    #markdownContent {
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 28px;
      color: rgba(255,255,255,0.85);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
      overflow-x: auto;
      max-height: 70vh;
      overflow-y: auto;
    }

    @media (max-width: 768px) {
      .search-actions-row button {
        flex: 1;
        padding: 12px;
        font-size: 14px;
      }
      .page-header { padding: 16px; }
      .markdown-report-header h3 { font-size: 16px; }
      #markdownContent { padding: 18px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="back-nav">
      <a href="/">← 返回首页</a>
      <span class="date">城市更新日报</span>
    </div>

    <header class="header page-header">
      <h1 class="page-title">城市更新日报</h1>
      <p>汇聚中央与地方政策、实践案例、数字化动态</p>
    </header>

    <div class="search-section">
      <div class="search-box full-width">
        <input type="text" id="searchInput" placeholder="例如：城市更新、深圳旧改、城中村改造..." />
      </div>
      <div class="search-actions-row">
        <button id="searchBtn">搜索</button>
        <button id="dailyBtn" class="btn-daily">一键生成今日新闻</button>
        <button id="refreshBtn">刷新</button>
      </div>
    </div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>正在抓取新闻并分析...</p>
    </div>

    <!-- 新闻列表 -->
    <div id="results" class="results hidden">
      <div class="stats-bar" id="statsBar" style="margin-bottom: 20px;"></div>
      <div class="category-tabs" id="categoryTabs">
        <button class="tab-btn active" data-cat="all">全部</button>
        <button class="tab-btn" data-cat="中央政策">中央政策</button>
        <button class="tab-btn" data-cat="地方政策">地方政策</button>
        <button class="tab-btn" data-cat="地方实践案例">地方实践案例</button>
        <button class="tab-btn" data-cat="城市更新数字化">城市更新数字化</button>
        <button class="tab-btn" data-cat="行业观点">行业观点</button>
      </div>
      <div id="newsList" class="news-list"></div>
    </div>

    <!-- AI日报助手 — 简化 -->
    <div id="aiAssistant" class="ai-assistant-simple hidden">
      <button id="generateReportBtn" class="btn-generate-daily">
        生成城市更新日报 <span>✦</span>
      </button>
    </div>

    <!-- Markdown 日报展示 -->
    <div id="markdownReport" class="markdown-report hidden">
      <div class="markdown-report-header">
        <h3>城市更新日报</h3>
        <button id="copyMarkdownBtn" class="btn-daily stats-copy-btn">复制日报</button>
      </div>
      <pre id="markdownContent"></pre>
    </div>

    <div id="error" class="error hidden"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
